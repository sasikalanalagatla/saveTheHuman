spring.application.name=SaveTheHuman

# PostgreSQL Configuration (overridable via environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/savethehuman}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin

# Gemini API Configuration (set AI_API_KEY environment variable before running)
ai.api.url=https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=
ai.api.key=${AI_API_KEY}
ai.api.model=gemini-2.5-flash

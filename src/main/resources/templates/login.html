<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Save The Human</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        :root {
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #38bdf8;
            --text: #f8fafc;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), #1e293b);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 2rem; margin-bottom: 2rem; color: var(--accent); }
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; color: #94a3b8; }
        input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: white;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            border: none;
            border-radius: 0.5rem;
            color: var(--bg-dark);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3); }
        .footer { margin-top: 1.5rem; color: #94a3b8; }
        .footer a { color: var(--accent); text-decoration: none; }
        .error { color: #f87171; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome Back</h1>
        <div th:if="${param.registered}" class="alert alert-success">
            Registration successful! Please login.
        </div>
        <div th:if="${param.error == 'ai_failed'}" class="alert alert-error">
            <p>Registration partially failed: Questions could not be generated by AI.</p>
            <p th:text="${session.error}"></p>
        </div>
        <div th:if="${param.error == 'invalid'}" class="alert alert-error">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="error" style="color: var(--accent)">Logged out successfully.</div>
        
        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        
        <div class="footer">
            Don't have an account? <a th:href="@{/register}">Register</a>
        </div>
    </div>
</body>
</html>

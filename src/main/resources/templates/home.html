<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save The Human - Home</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .floating-human {
            position: absolute;
            bottom: 10%;
            right: 10%;
            font-size: 5rem;
            animation: float 4s ease-in-out infinite;
            opacity: 0.2;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div th:if="${#authorization.expression('isAuthenticated()')}" style="margin-bottom: 1rem; font-size: 0.9rem; color: #818cf8;">
            Welcome back, <span th:text="${#authentication.name}" style="font-weight: 600;">User</span>!
            <form th:action="@{/logout}" method="post" style="display: inline; margin-left: 10px;">
                <button type="submit" style="background: none; border: none; color: #f87171; cursor: pointer; font-size: 0.8rem; text-decoration: underline; padding: 0;">Logout</button>
            </form>
        </div>

        <h1>Save The Human</h1>
        
        <div th:if="${session.message}" class="alert alert-error" style="background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; color: #fecaca;">
            <p th:text="${session.message}" style="margin-bottom: 0; color: #fecaca;"></p>
        </div>

        <p>A high-stakes word guessing game. Guess the word correctly to save the human from a falling fate. You have 6 chances!</p>
        
        <div class="actions">
            <div th:if="${#authorization.expression('isAuthenticated()')}" style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; justify-content: center;">
                <a th:href="@{/level-select}" class="btn">Start Game</a>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn" style="background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4); color: #f87171;">Logout</button>
                </form>
            </div>
            <div th:unless="${#authorization.expression('isAuthenticated()')}">
                <a th:href="@{/login}" class="btn" style="text-decoration: none;">Login to Play</a>
                <p style="margin-top: 1rem; font-size: 0.9rem;">
                    New player? <a th:href="@{/register}" style="color: #818cf8; text-decoration: none; font-weight: 600;">Create an account</a>
                </p>
            </div>
        </div>
    </div>
    <div class="floating-human">🧍</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save The Human - Levels</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --locked: rgba(255, 255, 255, 0.05);
            --completed: rgba(34, 197, 94, 0.2);
            --current: rgba(99, 102, 241, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .nav-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 2rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        .nav-link { color: #94a3b8; text-decoration: none; font-weight: 500; transition: color 0.2s; font-size: 0.95rem; }
        .nav-link:hover { color: #f8fafc; }
        .logout-btn {
            background: rgba(239,68,68,0.15); color: #f87171;
            border: 1px solid rgba(239,68,68,0.3); padding: 0.4rem 1.2rem;
            border-radius: 8px; font-size: 0.9rem; cursor: pointer;
            font-weight: 600; transition: all 0.2s;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.3); }
        body { padding-top: 80px; }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1.5rem;
            max-width: 1000px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .level-card {
            aspect-ratio: 1;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .level-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--locked);
            border-color: transparent;
        }

        .level-card.locked:hover {
            transform: none;
            box-shadow: none;
        }

        .level-card.completed {
            background: var(--completed);
            border-color: #22c55e66;
        }

        .level-card.current {
            background: var(--current);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            transform: scale(1.05);
        }

        .level-number {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .level-status {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            color: var(--text-muted);
        }

        .current .level-status {
            color: var(--primary);
            font-weight: 600;
        }

        .lock-icon {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .back-link {
            margin-top: 3rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--text);
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a href="/" class="nav-link">← Home</a>
        <span style="color: #94a3b8; font-size: 0.9rem;" th:text="'Hello, ' + ${username}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </nav>

    <div class="header">
        <h1>Select Level</h1>
        <p>Your Journey to Save the Human</p>
    </div>

    <div class="level-grid">
        <!-- Iterate through 1 to 50 -->
        <th:block th:each="i : ${#numbers.sequence(1, 50)}">
            <!-- Case: Level is Locked -->
            <div th:if="${i > userCurrentLevel}" class="level-card locked">
                <span class="lock-icon">🔒</span>
                <span class="level-status">Locked</span>
            </div>

            <!-- Case: Level is Playable (Current or Completed) -->
            <form th:if="${i <= userCurrentLevel}" th:action="@{/start}" method="post" style="display: contents;">
                <input type="hidden" name="level" th:value="${i}">
                <button type="submit" class="level-card" th:classappend="${i == userCurrentLevel ? 'current' : 'completed'}">
                    <span class="level-number" th:text="${i}">1</span>
                    <span class="level-status" th:text="${i == userCurrentLevel ? 'Play' : 'Cleared'}">Play</span>
                </button>
            </form>
        </th:block>
    </div>

    <a th:href="@{/}" class="back-link">← Back to Home</a>
</body>
</html>

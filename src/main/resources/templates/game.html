<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save The Human - Game</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f172a;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 1000px;
            width: 95%;
            margin: 20px;
        }

        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: 1fr;
            }
            .animation-area {
                order: -1;
            }
        }

        .info-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hint-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            margin-bottom: 2rem;
        }

        .hint-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .hint-text {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .word-display {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.5rem;
            margin-bottom: 2rem;
            font-family: 'Courier New', monospace;
            min-height: 3.5rem;
        }

        .chances {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: var(--text-muted);
        }

        .chances span {
            color: var(--danger);
            font-weight: 700;
        }

        .message {
            margin-bottom: 1.5rem;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(45px, 1fr));
            gap: 0.5rem;
            margin-top: 1rem;
            max-width: 500px;
        }

        .key-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.8rem 0;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .key-btn:hover:not(:disabled) {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .key-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.05);
            border-color: transparent;
        }

        .key-btn.correct { background: var(--success); }
        .key-btn.incorrect { background: var(--danger); }

        /* Hangman SVG */
        .animation-area {
            position: relative;
            height: 400px;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hangman-svg {
            width: 100%;
            height: 100%;
        }

        .hangman-part {
            fill: none;
            stroke: #f8fafc;
            stroke-width: 4;
            stroke-linecap: round;
            transition: opacity 0.5s ease;
            opacity: 0;
        }

        .hangman-part.visible {
            opacity: 1;
        }

        .hangman-frame {
            fill: none;
            stroke: #475569;
            stroke-width: 5;
            stroke-linecap: round;
        }
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 2rem;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .nav-link:hover { color: var(--text); }
        .logout-btn {
            background: rgba(239,68,68,0.15);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.3);
            padding: 0.4rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.3); }
        body { padding-top: 60px; }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a href="/level-select" class="nav-link">← Back to Levels</a>
        <span style="color: var(--text-muted); font-size: 0.9rem;" th:text="${username}"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </nav>
    <div class="game-board">
        <div class="info-area">
            <div class="hint-box">
                <div class="hint-label">
                    Level <span th:text="${currentLevel}">1</span> - Hint 
                    <span th:if="${isAlreadyCompleted}" style="color: #4ade80; margin-left: 10px; font-size: 0.8rem; border: 1px solid #4ade80; padding: 2px 6px; border-radius: 4px;">✅ COMPLETED</span>
                </div>
                <div class="hint-text" th:text="${hint}">Hint goes here</div>
            </div>

            <div class="word-display" th:text="${displayWord}">_ _ _ _</div>

            <div class="chances">
                Chances Used: <span th:text="${wrongGuesses}">0</span> / <span th:text="${maxChances}">6</span>
            </div>

            <div th:if="${message != ''}" class="message" th:text="${message}">Message</div>

            <div class="keyboard">
                <form th:each="letter : ${alphabet}" th:action="@{/guess}" method="post" style="display: contents;">
                    <input type="hidden" name="letter" th:value="${letter}">
                    <button type="submit" 
                            class="key-btn" 
                            th:text="${letter}"
                            th:disabled="${guessedLetters.contains(letter)}">
                    </button>
                </form>
            </div>
        </div>

        <div class="animation-area">
            <svg class="hangman-svg" viewBox="0 0 300 380" xmlns="http://www.w3.org/2000/svg">
                <!-- Gallows Frame (always visible) -->
                <line class="hangman-frame" x1="20" y1="360" x2="280" y2="360"/>  <!-- ground -->
                <line class="hangman-frame" x1="60"  y1="360" x2="60"  y2="20"/>  <!-- pole -->
                <line class="hangman-frame" x1="60"  y1="20"  x2="180" y2="20"/>  <!-- top beam -->
                <line class="hangman-frame" x1="180" y1="20"  x2="180" y2="60"/>  <!-- rope -->

                <!-- 1: Head -->
                <circle class="hangman-part" th:classappend="${wrongGuesses >= 1} ? 'visible' : ''"
                        cx="180" cy="90" r="30" stroke="#f8fafc"/>

                <!-- 2: Left Arm -->
                <line class="hangman-part" th:classappend="${wrongGuesses >= 2} ? 'visible' : ''"
                      x1="180" y1="120" x2="140" y2="170"/>

                <!-- 3: Right Arm -->
                <line class="hangman-part" th:classappend="${wrongGuesses >= 3} ? 'visible' : ''"
                      x1="180" y1="120" x2="220" y2="170"/>

                <!-- 4: Body -->
                <line class="hangman-part" th:classappend="${wrongGuesses >= 4} ? 'visible' : ''"
                      x1="180" y1="120" x2="180" y2="240"/>

                <!-- 5: Left Leg -->
                <line class="hangman-part" th:classappend="${wrongGuesses >= 5} ? 'visible' : ''"
                      x1="180" y1="240" x2="140" y2="300"/>

                <!-- 6: Right Leg -->
                <line class="hangman-part" th:classappend="${wrongGuesses >= 6} ? 'visible' : ''"
                      x1="180" y1="240" x2="220" y2="300"/>
            </svg>
        </div>
    </div>
</body>
</html>
